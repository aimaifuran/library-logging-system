<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Logging System</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   
</head>
<body>

    <div class="dashboard-wrapper">
        <div class="drawer-overlay" id="drawerOverlay" onclick="toggleMenu()"></div>

        <div class="sidebar-drawer" id="sidebarDrawer">
            <button class="close-drawer-btn" onclick="toggleMenu()">×</button>
            
            <div class="drawer-header">
                <img src="evsu.jpg" alt="EVSU Logo" class="drawer-avatar-img">
                <div class="drawer-welcome">Students Library Logging Portal</div>
            </div>

            <div class="nav-menu">
                <button class="nav-btn active" id="studentNavBtn" onclick="switchView('student')">
                    <span>🏠</span> Student Sign-In
                </button>
                <button class="nav-btn" id="adminNavBtn" onclick="switchView('admin')">
                    <span>📊</span> Admin
                </button>
            </div>
        </div>

        <div class="top-navbar">
            <button class="menu-toggle-btn" onclick="toggleMenu()">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </button>
            <div class="navbar-title" id="navbarTitle">Students Library Logging Portal</div>
            <div style="width: 38px;"></div> 
        </div>

        <div class="main-content">
            
            <div id="studentPanel" class="view-panel active">
                <div class="header-panel" style="margin-bottom: 12px;"></div>
                
                <div class="hero-banner">
                    <div>
                        <div class="hero-title">Welcome, Evsunistas! ☀️</div>
                        <div class="hero-subtitle">Mabuhay! Please input your correct program details below to log your visit.</div>
                    </div>
                </div>

                <div class="plush-card">
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="studentId">Student ID Number</label>
                            <input type="text" id="studentId" required placeholder="e.g., 2023-10042">
                        </div>

                        <div class="form-group">
                            <label for="studentName">Full Name</label>
                            <input type="text" id="studentName" required placeholder="e.g., Jane Doe">
                        </div>

                        <div class="form-group">
                            <label for="course">Course Program</label>
                            <select id="course" required>
                                <option value="">Select Course</option>
                                <option value="BSIT">BSIT (Information Technology)</option>
                                <option value="BSFI">BSFI (Fisheries)</option>
                                <option value="BSENTREP">BSENTREP (Entrepreneurship)</option>
                                <option value="BSED-MATH">BSED-MATH (Education)</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="yearLevel">Year Level</label>
                            <select id="yearLevel" required>
                                <option value="">Select Year</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="section">Section</label>
                            <input type="text" id="section" required placeholder="e.g., A, B, 1A">
                        </div>

                        <button type="submit">Submit Log In</button>
                    </form>
                    <div id="statusMessage" class="status-message"></div>
                </div>
            </div>

            <div id="adminPanel" class="view-panel">
                <div class="header-panel"></div>

                <div class="hero-banner">
                    <div>
                        <div class="hero-title">Realtime Archive Logs</div>
                        <div class="hero-subtitle">Logs grouped into daily operational folders. Click folders to collapse/expand entries.</div>
                    </div>
                </div>

                <div id="foldersContainer"></div>
            </div>

        </div>
    </div>


    <script>
        const SUPABASE_URL = 'https://mxwcbtypoemihcfecewt.supabase.co'; 
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14d2NidHlwb2VtaWhjZmVjZXd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxOTU3MTAsImV4cCI6MjA5NDc3MTcxMH0.ZSQAJK2cz4zapHK2szeglGP78wNLGav8IF4zbdqr9OY';
        
        let supabaseInstance;
        try {
            if (typeof supabase !== 'undefined' && supabase.createClient) {
                supabaseInstance = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            } else if (typeof Supabase !== 'undefined' && Supabase.createClient) {
                supabaseInstance = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            }
        } catch(e) {
            console.error("Supabase initialization error:", e);
        }

        function toggleMenu() {
            const drawer = document.getElementById('sidebarDrawer');
            const overlay = document.getElementById('drawerOverlay');
            
            drawer.classList.toggle('open');
            overlay.classList.toggle('show');
        }

        function switchView(view) {
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));

            if (view === 'student') {
                document.getElementById('studentPanel').classList.add('active');
                document.getElementById('studentNavBtn').classList.add('active');
                document.getElementById('navbarTitle').innerText = "Students Library Logging Portal";
            } else if (view === 'admin') {
                document.getElementById('adminPanel').classList.add('active');
                document.getElementById('adminNavBtn').classList.add('active');
                document.getElementById('navbarTitle').innerText = "System Administration";
                fetchLogs(); 
            }
            
            toggleMenu(); 
        }

        const loginForm = document.getElementById('loginForm');
        const statusMessage = document.getElementById('statusMessage');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const studentId = document.getElementById('studentId').value;
            const name = document.getElementById('studentName').value;
            const course = document.getElementById('course').value;
            const yearLevel = document.getElementById('yearLevel').value;
            const section = document.getElementById('section').value;

            if (!supabaseInstance) {
                showStatus('Database client is unavailable.', '#E25C5C');
                return;
            }

            // Kapag walang explicitly declared na time_in rito, ang database default system (now()) ang awtomatikong magtatala.
            const { data, error } = await supabaseInstance
                .from('library_logs')
                .insert([
                    { 
                        student_id: studentId, 
                        name: name, 
                        course: course, 
                        year_level: yearLevel,
                        section: section
                    }
                ]);

            if (error) {
                showStatus('Error saving log data.', '#E25C5C');
                console.error(error);
            } else {
                showStatus('Logged in successfully! ☀️', '#5CC88A');
                loginForm.reset();
            }
        });

        function showStatus(text, color) {
            statusMessage.innerText = text;
            statusMessage.style.backgroundColor = color;
            statusMessage.style.color = 'white';
            statusMessage.style.display = 'block';
            setTimeout(() => {
                statusMessage.style.display = 'none';
            }, 4000);
        }

        async function fetchLogs() {
            const container = document.getElementById('foldersContainer');
            if (!container) return;

            container.innerHTML = '<div style="text-align:center; padding: 20px; color: #5A0006;">Loading Archive Folders...</div>';

            if (!supabaseInstance) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color:#E25C5C;">Offline. Cannot connect to archive.</div>';
                return;
            }

            let query = supabaseInstance.from('library_logs').select('*');
            const { data: dataOrdered, error: errorOrdered } = await query.order('time_in', { ascending: false });

            if (errorOrdered) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color:#E25C5C;">Error loading log entries.</div>';
                return;
            }

            renderFolders(dataOrdered);
        }

        // ENGINE FUNCTION: Nagpapangkat ng logs para maging "Date Folders"
        function renderFolders(data) {
            const container = document.getElementById('foldersContainer');
            if (!container) return;
            
            container.innerHTML = '';

            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding: 20px; color: #920004;">No records found inside the log database.</div>';
                return;
            }

            // Step 1: I-pangkat ang logs base sa Petsa (YYYY-MM-DD)
            const groupedLogs = {};
            data.forEach((log) => {
                const dateObj = log.time_in ? new Date(log.time_in) : new Date();
                
                // Formatted string key (e.g., "May 21, 2026") para maging malinis tingnan ang folder label
                const folderDateLabel = dateObj.toLocaleDateString([], { month: 'long', day: 'numeric', year: 'numeric' });
                
                if (!groupedLogs[folderDateLabel]) {
                    groupedLogs[folderDateLabel] = [];
                }
                groupedLogs[folderDateLabel].push(log);
            });

            // Step 2: Gumawa ng HTML folder system elements para sa bawat Petsa
            Object.keys(groupedLogs).forEach((dateLabel, folderIndex) => {
                const logsInThisDate = groupedLogs[dateLabel];
                
                const folderGroupElement = document.createElement('div');
                folderGroupElement.className = 'date-folder-group';
                
                // Awtomatikong buksan ang pinakabagong folder (#0 / pinaka-unang date), i-collapse naman ang mga nakaraang araw
                if (folderIndex > 0) {
                    folderGroupElement.classList.add('collapsed');
                }

                folderGroupElement.innerHTML = `
                    <div class="date-folder-header" onclick="toggleFolder(this)">
                        <div class="folder-title-flex">
                            <span>📁</span> ${dateLabel} 
                            <span class="log-count-badge">${logsInThisDate.length} Students</span>
                        </div>
                        <span class="folder-icon-indicator">▼</span>
                    </div>
                    <div class="date-folder-content">
                        <div class="table-container" style="box-shadow: none; border: none; padding: 0;">
                            <table>
                                <thead>
                                    <tr>
                                        <th>No.</th>
                                        <th>Student ID</th>
                                        <th>Name</th>
                                        <th>Course Details</th>
                                        <th>Time In</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${logsInThisDate.map((log, index) => {
                                        const visibleIndex = logsInThisDate.length - index;
                                        const formattedTime = log.time_in ? new Date(log.time_in).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'N/A';
                                        const courseDetails = `${log.course || ''} ${log.year_level?.split(' ')[0] || ''}-${log.section || ''}`;
                                        return `
                                            <tr>
                                                <td>#${visibleIndex}</td>
                                                <td>${log.student_id || 'N/A'}</td>
                                                <td>${log.name || 'N/A'}</td>
                                                <td>${courseDetails}</td>
                                                <td>${formattedTime}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                container.appendChild(folderGroupElement);
            });
        }

        // Toggles expansion/collapse ng napiling date folder card block
        function toggleFolder(headerElement) {
            const folderGroupElement = headerElement.parentElement;
            folderGroupElement.classList.toggle('collapsed');
        }
    </script>
    
</body>
</html>
